name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: PHP ${{ matrix.php }} quality checks
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHPCS (WordPress Coding Standards)
        run: vendor/bin/phpcs --standard=WordPress includes/ admin/ wp-kwtsms.php

      - name: PHPStan (static analysis)
        run: vendor/bin/phpstan analyse --configuration phpstan.neon --no-progress
