name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches plugin header
        run: |
          HEADER_VER=$(grep -m1 '^ \* Version:' wp-kwtsms.php | sed 's/.*Version: *//')
          TAG_VER="${{ steps.version.outputs.version }}"
          if [ "$HEADER_VER" != "$TAG_VER" ]; then
            echo "ERROR: tag version ($TAG_VER) does not match plugin header version ($HEADER_VER)"
            exit 1
          fi
          README_VER=$(grep '^Stable tag:' readme.txt | sed 's/Stable tag: *//')
          if [ "$README_VER" != "$TAG_VER" ]; then
            echo "ERROR: tag version ($TAG_VER) does not match readme.txt Stable tag ($README_VER)"
            exit 1
          fi
          echo "Version check passed: $TAG_VER"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the block between "= X.Y.Z =" and the next "= " heading
          NOTES=$(awk "/^= ${VERSION} =/{found=1; next} found && /^= [0-9]/{exit} found{print}" readme.txt | sed '/^[[:space:]]*$/d')
          if [ -z "$NOTES" ]; then
            NOTES="See readme.txt for details."
          fi
          # Write to file to preserve newlines
          echo "$NOTES" > /tmp/release-notes.txt
          echo "Release notes extracted for $VERSION"

      - name: Install production dependencies
        run: composer install --no-dev --no-scripts --optimize-autoloader

      - name: Build plugin zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PLUGIN_SLUG="wp-kwtsms"
          BUILD_DIR="/tmp/${PLUGIN_SLUG}"
          ZIP_NAME="${PLUGIN_SLUG}-${VERSION}.zip"

          # Copy repo into a slug-named directory, excluding distignore entries
          rsync -r --exclude-from=.distignore . "${BUILD_DIR}/"

          # Create the zip with the slug folder at the root (WordPress convention)
          cd /tmp
          zip -r "${ZIP_NAME}" "${PLUGIN_SLUG}/"
          echo "ZIP_PATH=/tmp/${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "Built: ${ZIP_NAME} ($(du -sh /tmp/${ZIP_NAME} | cut -f1))"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: /tmp/release-notes.txt
          files: ${{ env.ZIP_PATH }}
          draft: false
          prerelease: false
          generate_release_notes: true
